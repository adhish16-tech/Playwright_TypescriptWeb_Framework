name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run full regression suite every night at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options: [smoke, regression, all]
      browser:
        description: 'Browser to test on'
        required: false
        default: 'all'
        type: choice
        options: [all, chromium, firefox, webkit]

env:
  ENV: ${{ github.event.inputs.environment || 'staging' }}
  NODE_VERSION: '20'

jobs:
  # ─── Install & Cache ──────────────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─── Lint & Type Check ────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: TypeScript check
        run: npm run typecheck

  # ─── Smoke Tests ──────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [install, quality]
    if: github.event_name == 'pull_request' || github.event.inputs.test_suite == 'smoke'
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Restore browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=${{ matrix.browser }}
        env:
          ENV: ${{ env.ENV }}
          BASE_URL: ${{ secrets[format('{0}_BASE_URL', env.ENV)] }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ─── Regression Tests ─────────────────────────────────────────────────────
  regression:
    name: Regression Tests (Sharded)
    runs-on: ubuntu-latest
    needs: smoke
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event.inputs.test_suite == 'regression'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Restore browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run regression tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --grep @regression --shard=${{ matrix.shard }}/4
        env:
          ENV: ${{ env.ENV }}
          BASE_URL: ${{ secrets[format('{0}_BASE_URL', env.ENV)] }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Upload shard results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-blob-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # ─── Merge & Publish Reports ──────────────────────────────────────────────
  report:
    name: Merge & Publish Reports
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: regression-blob-*
          merge-multiple: true
      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-final
          path: playwright-report/
          retention-days: 30
